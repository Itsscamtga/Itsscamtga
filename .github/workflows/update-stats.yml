name: Update Profile Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight
  workflow_dispatch:        # allows manual run from Actions tab
  push:
    branches:
      - main

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download stats card
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api?username=Itsscamtga&show_icons=true&theme=radical&hide_border=true" -o assets/stats.svg
          grep -q "<svg" assets/stats.svg || echo "⚠️ stats.svg fetch failed, keeping old version" 

      - name: Download top languages card
        run: |
          curl -sL "https://github-readme-stats.vercel.app/api/top-langs/?username=Itsscamtga&layout=pie&theme=radical&hide_border=true" -o assets/top-langs.svg.tmp
          grep -q "<svg" assets/top-langs.svg.tmp && mv assets/top-langs.svg.tmp assets/top-langs.svg || (echo "⚠️ top-langs.svg fetch failed, keeping old version" && rm -f assets/top-langs.svg.tmp)

      - name: Download streak stats
        run: |
          curl -sL "https://streak-stats.demolab.com/?user=Itsscamtga&theme=radical&hide_border=true" -o assets/streak.svg.tmp
          grep -q "<svg" assets/streak.svg.tmp && mv assets/streak.svg.tmp assets/streak.svg || (echo "⚠️ streak.svg fetch failed, keeping old version" && rm -f assets/streak.svg.tmp)

      - name: Generate trophies (via Action, bypasses flaky public server)
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: Itsscamtga
          output_path: assets/trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update profile stats"
          git push
